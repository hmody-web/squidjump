    <script>




        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const gameInfo = document.getElementById('game-info');
        const gameOverScreen = document.getElementById('game-over');
        let isPaused = false;
        let button9Pressed = false;


        function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.y = canvas.height - player.height - groundHeight; // Adjust player position
    }

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const groundHeight = 70;
        const player = {
            x: 5,
            y: canvas.height -100 - groundHeight,
            width: 30,
            height: 50,
            color: 'red', 
            dy: 100,
            gravity: 0.8,
            jumpStrength: -15,
            onGround: true,
            rotation: 0,
            image: document.getElementById('player-sray')  // Add this line
        };

        // URL of an anime character image online
        const obstacles = [];
        let score = 0;
        let gameSpeed = 5;
        let gameRunning = true;
        let initialSpeed = 5; // Restored speed

        // Background music
        const backgroundMusic = new Audio('./img2/squidgame');
        backgroundMusic.loop = true; // Loop the music

        // Lose sound effect
        const loseSound = new Audio('./img2/lose.wav');



        
        function createObstacle() {
            const height = Math.random() * 50 + 20;
            const neonColors = ['#76b0bd', '#24bb69', '#ef8436']; // Hot Pink, Neon Green, Bright Blue
            const obstacle = {
                x: canvas.width + 100,
                y: canvas.height - height - groundHeight,
                width: 50,
                height,
                color: neonColors[Math.floor(Math.random() * neonColors.length)] // Randomly select from 3 colors
            };
            obstacles.push(obstacle);
        }

        function updatePlayer() {
            if (player.dy < 0) {
    player.rotation = -30; // دوران كامل عند القفز
} else if (player.dy > 0) {
    player.rotation = +20;
} else {
    player.rotation = 0;
}
            if (!player.onGround) {   
        player.dy += player.gravity;
        player.y += player.dy;
            }
      

    if (player.y + player.height >= canvas.height - groundHeight) {
        player.y = canvas.height - player.height - groundHeight;
        player.onGround = true;
        player.dy = 0;
    }
        }

        function updateObstacles() {
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obstacle = obstacles[i];
                obstacle.x -= gameSpeed;

                if (obstacle.x + obstacle.width < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    document.getElementById('score').textContent = score;
                }
            }

            // زيادة سرعة اللعبة وتقليل المسافات بين العقبات بعد الوصول إلى نتيجة 50
            if (score > 20) {
               
                gameSpeed = initialSpeed + 1.3; // زيادة سرعة اللعبة
                if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 300) {
                    createObstacle();
                }
            }
            if (score > 50) {
                gameSpeed = initialSpeed + 2; // زيادة سرعة اللعبة
                if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 400) {
                    createObstacle();
                }
            }
            if (score > 100) {
                cloudImage.src = './img2/stars.png';
                body.style.background = '#270a05'; 
                if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 470) {
                    createObstacle();
                }
            }
            if (score > 105) {
                gameSpeed = initialSpeed + 4; // زيادة سرعة اللعبة
            }
             else {
                if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 200) {
                    createObstacle();
                }
            }
            if (score > 155) {
                cloudImage.src = './img2/cloud.png';
                body.style.background = '#cddee6'; 
                gameSpeed = initialSpeed + 6; // زيادة سرعة اللعبة
                if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 550) {
                    createObstacle();
                }
            }
        }

        function detectCollision() {
            for (const obstacle of obstacles) {
                if (
                    player.x < obstacle.x + obstacle.width &&
                    player.x + player.width > obstacle.x &&
                    player.y < obstacle.y + obstacle.height &&
                    player.y + player.height > obstacle.y
                ) {
                    endGame();
                }
            }
        }

        function drawObstacles() {
            for (const obstacle of obstacles) {
                // تغيير لون العقبات إلى الأسود عند الوصول إلى النتيجة 100
                if (score > 100) {
                    ctx.fillStyle = '#270a05';
                } else {
                    ctx.fillStyle = obstacle.color;
                }
                if (score > 150) {
                    ctx.fillStyle = obstacle.color;
                } 
                // إعداد تأثير الظل
                ctx.shadowBlur = 20; // مقدار التوهج
                ctx.shadowColor = obstacle.color; // لون الظل يتناسب مع لون العقبة

                // إنشاء مسار للعقبة
                ctx.beginPath();
                ctx.moveTo(obstacle.x + 10, obstacle.y);
                ctx.lineTo(obstacle.x + obstacle.width - 10, obstacle.y);
                ctx.quadraticCurveTo(obstacle.x + obstacle.width, obstacle.y, obstacle.x + obstacle.width, obstacle.y + 10);
                ctx.lineTo(obstacle.x + obstacle.width, obstacle.y + obstacle.height);
                ctx.lineTo(obstacle.x, obstacle.y + obstacle.height);
                ctx.lineTo(obstacle.x, obstacle.y + 10);
                ctx.quadraticCurveTo(obstacle.x, obstacle.y, obstacle.x + 10, obstacle.y);

                // ملء العقبة
                ctx.fill();

                // إعادة تعيين تأثير الظل بعد الرسم
                ctx.shadowBlur = 0;
            }
        }
    

        function drawPlayer() {
            const sprite = document.getElementById('player-sray');
            sprite.style.display = 'block';
            sprite.style.marginTop = '1.5px';
            sprite.style.left = `calc(50% + 0px)`; // Center with offset
            sprite.style.top = player.y + 'px';
            sprite.style.transform = `translateX(-50%) rotate(${player.rotation}deg)`;
            sprite.style.transition = 'transform 0.3s ease';
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
            ctx.rotate((player.rotation * Math.PI) / 180);
            ctx.restore();
            }

        function drawGround() {
            // تغيير لون الأرضية بناءً على النتيجة
            if (score > 100) {
                ctx.fillStyle = '#e24a4a'; // 100
            } else {
                ctx.fillStyle = '#edd096'; // اللون الافتراضي
            }
            if (score > 150) {
                ctx.fillStyle = '#edd096'; // 150
                }
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
        }

        function startGame() {
            startScreen.style.display = 'none';
            canvas.style.display = 'block';
            gameInfo.style.display = 'block';
            gameInfo.style.top = '45%'; // تعيين الموضع إلى 45%
            gameSpeed = 5; // Set initial speed
            player.x = canvas.width / 2 - player.width / 2; // Move player to center
            player.y = canvas.height - player.height - groundHeight; // Position above ground
            backgroundMusic.play(); // تشغيل الموسيقى عند بدء اللعبة
            gameLoop(); // بدء حلقة اللعبة
        }
        const volumeControl = document.getElementById('volumeControl');

volumeControl.addEventListener('input', (e) => {
    const volume = e.target.value / 100;  // تحويل القيمة بين 0 و 1
    backgroundMusic.volume = volume;
    loseSound.volume = volume;
    jumpSound.volume = volume;
});
let highScore = localStorage.getItem('highScore') || 0; // استرجاع النتيجة المخزنة
document.getElementById('high-score').textContent = highScore;
function endGame() {
    gameRunning = false;
    if (score > highScore) {
        highScore = score;
        // تخزين النتيجة لمدة 5 سنوات
        const expiryDate = new Date();
        expiryDate.setFullYear(expiryDate.getFullYear() + 5);
        localStorage.setItem('highScore', highScore);
        document.getElementById('high-score').textContent = highScore;
    }
    // تغيير صورة اللاعب عند الخسارة
    gameOverScreen.style.display = 'block';
    canvas.style.filter = 'blur(7px)';
    // تغيير موقع score عند الخسارة
    const scoreElement = document.getElementById('game-info');
    scoreElement.style.marginTop = '10pc'; // تطبيق التغيير
    backgroundMusic.pause(); // إيقاف الموسيقى عند انتهاء اللعبة
    backgroundMusic.currentTime = 0; // إعادة ضبط موقع التشغيل
    loseSound.play(); // تشغيل صوت الخسارة
}

function restartGame() {
    gameOverScreen.style.display = 'none';
    document.getElementById('player-sray')

    // Reset to original sprite
    score = 0;
    document.getElementById('score').textContent = score;
    player.x = canvas.width / 2 - player.width / 2;
    player.y = canvas.height - 0 - groundHeight;
    player.dy = 0;
    obstacles.length = 0;
    gameSpeed = initialSpeed;
    gameRunning = true;
    canvas.style.filter = 'none';
    const scoreElement = document.getElementById('game-info');
    scoreElement.style.marginTop = '0pc'; 
    backgroundMusic.play(); // تشغيل الموسيقى عند إعادة بدء اللعبة
    cloudImage.src = './img2/cloud.png';
    body.style.background = '#0e62ad'; 
    gameLoop();
}


function pauseGame() {
    if (gameOverScreen.style.display === 'none') { // التحقق من عدم ظهور شاشة الخسارة
        isPaused = true;
        gameRunning = false;
        const pauseMenu = document.getElementById('pause-menu');
        pauseMenu.style.display = 'block';
        // إضافة تأخير صغير قبل إضافة الclass
        setTimeout(() => pauseMenu.classList.add('active'), 10);        document.getElementById('pause-current-score').textContent = score;
        document.getElementById('pause-high-score').textContent = highScore;
        canvas.style.filter = 'blur(5px)';
        backgroundMusic.pause();
    }
    isPaused = true;
    gameRunning = false;
    document.getElementById('pause-menu').style.display = 'block';
    document.getElementById('pause-current-score').textContent = score;
    document.getElementById('pause-high-score').textContent = highScore;
    canvas.style.filter = 'blur(5px)';
    backgroundMusic.pause();
}

function resumeGame() {
    const pauseMenu = document.getElementById('pause-menu');
    pauseMenu.classList.remove('active');
    // انتظار انتهاء الحركة
    setTimeout(() => {
        pauseMenu.style.display = 'none';
        isPaused = false;
        gameRunning = true;
        canvas.style.filter = 'none';
        backgroundMusic.play();
        gameLoop();
    }, 300);
}
        // Add pause functionality to keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && gameRunning && gameOverScreen.style.display === 'none') {
                if (isPaused) {
            resumeGame();
        } else {
            pauseGame();
        }
        return;
    }
});

        function togglePause() {
            if (gameOverScreen.style.display === 'none') { // إضافة شرط التحقق من شاشة الخسارة
            if (document.getElementById('pause-menu').style.display === 'block') {
        resumeGame();
    } else {
        pauseGame();
    }
            }}

function checkGamepadForStart() {
    const gamepads = navigator.getGamepads();
    const gamepad = gamepads[0];
    
    if (gamepad) {
       
        // زر X (الزر ) لبدء اللعبة
        if (gamepad.buttons[2].pressed) {
            if (startScreen.style.display !== 'none') {
                startGame();
            } else if (gameOverScreen.style.display !== 'none') {
                restartGame();
            }
        }
    }
    
    requestAnimationFrame(checkGamepadForStart);
}

// ابدأ فحص يد التحكم عند تحميل الصفحة
checkGamepadForStart();

// أضف معالج توصيل يد التحكم

     // للإيقاف المؤقت
     if (gamepad.buttons[9].pressed && gameRunning && !button9Pressed && gameOverScreen.style.display === 'none') {

        pauseGame();

} else if (!gamepad.buttons[9].pressed) {
    button9Pressed = false;
}
        //X  للقفز
        if ((gamepad.buttons[0].pressed) && player.onGround) {
            player.dy = player.jumpStrength;
            player.onGround = false;
            jumpSound.play();
            
        }

       

     // تبديل ملء الشاشة
     if (gamepad.buttons[8].pressed && !button8Pressed) {
            button8Pressed = true;
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        } else if (!gamepad.buttons[8].pressed) {
            button8Pressed = false;
        }

       // خفض الصوت - زر 6
       if (gamepad.buttons[6].pressed && !button6Pressed) {
           button6Pressed = true;
           let currentVolume = volumeControl.value;
           volumeControl.value = Math.max(0, currentVolume - 10);
           volumeControl.dispatchEvent(new Event('input'));
       } else if (!gamepad.buttons[6].pressed) {
           button6Pressed = false;
       }

       // رفع الصوت - زر 7
       if (gamepad.buttons[7].pressed && !button7Pressed) {
           button7Pressed = true;
           let currentVolume = volumeControl.value;
           volumeControl.value = Math.min(100, parseInt(currentVolume) + 10);
           volumeControl.dispatchEvent(new Event('input'));
       } else if (!gamepad.buttons[7].pressed) {
           button7Pressed = false;
       }
    }
    
    requestAnimationFrame(checkGamepad);
}

// بدء التحقق من يد التحكم
checkGamepad();

        const jumpSound = new Audio('./img2/jump.mp3'); // صوت قفز
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Escape') {  // تجاهل زر ESC
            if (startScreen.style.display !== 'none') {
                startGame();
                return;
            }
    
            if (gameOverScreen.style.display !== 'none') {
                restartGame();
                return;
            }

            if (e.code === 'ArrowUp' && player.onGround) {
                player.dy = player.jumpStrength;
                player.onGround = false;
                jumpSound.play(); // تشغيل الصوت عند القفز
            }
        }});

        function gameLoop() {
            if (!gameRunning || isPaused) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updatePlayer();
            updateObstacles();
            updateClouds(); // تحديث الغيوم
            detectCollision();
            drawGround();
            drawPlayer();
            drawObstacles();
            drawClouds(); // رسم الغيوم

            requestAnimationFrame(gameLoop);
        }

        const clouds = []; // مصفوفة لتخزين الغيوم
        const cloudImage = new Image();
        cloudImage.src = './img2/cloud.png';

        function createCloud() {
            const cloud = {
                x: Math.random() * canvas.width, // موقع عشوائي على المحور السيني
                y: Math.random() * (canvas.height / 2), // موقع عشوائي على المحور الصادي (نصف الشاشة العلوي)
                width: 60 + Math.random() * 50, // عرض عشوائي
                height: 60 + Math.random() * 20, // ارتفاع عشوائي
                speed: Math.random() * 0.5 + 0.5, // سرعة عشوائية
                direction: Math.random() < 0.5 ? -1 : 1 // اتجاه عشوائي (يمين أو يسار)
            };
            clouds.push(cloud);
        }

        function updateClouds() {
            for (let i = clouds.length - 1; i >= 0; i--) {
                const cloud = clouds[i];
                cloud.x += cloud.speed * cloud.direction; // تحريك الغيمة بناءً على الاتجاه

                // إعادة الغيمة إلى الجانب الآخر إذا خرجت من الشاشة
                if (cloud.x > canvas.width) {
                    cloud.x = -cloud.width;
                } else if (cloud.x + cloud.width < 0) {
                    cloud.x = canvas.width;
                }
            }

            // إنشاء غيوم جديدة بشكل دوري
            while (clouds.length < 15) { // زيادة عدد الغيوم إلى 15
                createCloud();
            }
        }

        function drawClouds() {
            ctx.globalAlpha = 0.5; // ضبط الشفافية للغيوم
            for (const cloud of clouds) {
                ctx.drawImage(cloudImage, cloud.x, cloud.y, cloud.width, cloud.height);
            }
            ctx.globalAlpha = 1.0; // إعادة الشفافية إلى القيمة الافتراضية بعد رسم الغيوم
        }

     

        const newSprite = './img2/p3.png';
        let isNewSpriteVisible = false; // متغير للتحكم في حالة الصورة

        setInterval(() => {
            if (isNewSpriteVisible) {
                document.getElementById('player-sray').src = './img2/p.gif';
                // العودة إلى الصورة الأصلية
            } else {
                document.getElementById('player-sprite').src = './img2/p3.png';
                // تغيير إلى الصورة الجديدة
            }
            isNewSpriteVisible = !isNewSpriteVisible; // تغيير الحالة
        }, 60000); // 500 مللي ثانية

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && gameRunning ) {
                togglePause();
                return;
    }
            if (startScreen.style.display !== 'none') {
                startGame();
                return;
            }

            if (gameOverScreen.style.display !== 'none') {
                restartGame();
                return;
            }

            if (e.code === 'ArrowUp' && player.onGround) {
                player.dy = player.jumpStrength;
                player.onGround = false;
            }
        });

        document.addEventListener('click', () => {
            if (startScreen.style.display !== 'none') {
                gameOverScreen.style.display = 'none';
                startGame();
                return;
            }

            if (gameOverScreen.style.display !== 'none') {
                restartGame();
                return;
            }

            if (player.onGround) {
                player.dy = player.jumpStrength;
                player.onGround = false;
            }
        });

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } 
            }
        }

      // اختيار بالاسهم

        const options = document.querySelectorAll('#pause-menu option');
    let selectedOptionIndex = 0;

    function updateSelectedOption() {
        options.forEach((option, index) => {
            if (index === selectedOptionIndex) {
                option.style.background = '#edd096';  // تمييز الخيار المحدد
            } else {
                option.style.background = '';
            }
        });
    }

    document.addEventListener('keydown', (e) => {
        const pauseMenu = document.getElementById('pause-menu');

        if (pauseMenu.style.display === 'block') {
            if (e.key === 'ArrowUp') {
                selectedOptionIndex = (selectedOptionIndex - 1 + options.length) % options.length;
                updateSelectedOption();
            } else if (e.key === 'ArrowDown') {
                selectedOptionIndex = (selectedOptionIndex + 1) % options.length;
                updateSelectedOption();
            } else if (e.key === 'Enter') {
                options[selectedOptionIndex].click();  // تنفيذ الخيار المحدد
            }
        }
    });

 if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then((registration) => {
        console.log('Service Worker registered with scope:', registration.scope);
      })
      .catch((error) => {
        console.error('Service Worker registration failed:', error);
      });
  });
}    
// دعم اللمس للقفز
document.addEventListener('touchstart', function (e) {
    if (startScreen.style.display !== 'none') {
        e.preventDefault();
        startGame();
        return;
    }

    if (gameOverScreen.style.display !== 'none' && !gameRunning) {
        e.preventDefault();
        restartGame();
        return;
    }

    if (gameRunning && player.onGround) {
        e.preventDefault();
        player.dy = player.jumpStrength;
        player.onGround = false;
        jumpSound.play();
    }
}, { passive: false });
